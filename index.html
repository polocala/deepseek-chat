<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek AI Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .chat-container {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .chat-header h1 {
            font-size: 1.5rem;
        }
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 15px;
            display: flex;
        }
        .user-message {
            justify-content: flex-end;
        }
        .user-message .message-content {
            background: #667eea;
            color: white;
            border-radius: 20px 20px 5px 20px;
        }
        .ai-message .message-content {
            background: white;
            color: #333;
            border-radius: 20px 20px 20px 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .message-content {
            max-width: 70%;
            padding: 10px 15px;
            word-wrap: break-word;
        }
        .chat-input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
        }
        .chat-input-area input:focus {
            border-color: #667eea;
        }
        .chat-input-area button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }
        .chat-input-area button:hover {
            background: #5a67d8;
        }
        .chat-input-area button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .name-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .name-modal {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .name-modal h2 {
            margin-bottom: 20px;
            color: #667eea;
        }
        .name-modal input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
        }
        .name-modal button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
        }
        .loading {
            text-align: center;
            padding: 10px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 DeepSeek AI Assistant</h1>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="loading">Welcome! Please enter your name to start...</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="Type your message..." disabled>
            <button id="sendButton" disabled>Send</button>
        </div>
    </div>

    <div class="name-overlay" id="nameOverlay">
        <div class="name-modal">
            <h2>👋 Welcome!</h2>
            <p style="margin-bottom: 20px;">What's your name?</p>
            <input type="text" id="userNameInput" placeholder="Enter your name">
            <button onclick="setName()">Start Chatting</button>
        </div>
    </div>

    <script>
        let userName = '';
        const messagesDiv = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');

        function setName() {
            const nameInput = document.getElementById('userNameInput');
            userName = nameInput.value.trim();
            if (userName) {
                document.getElementById('nameOverlay').style.display = 'none';
                messageInput.disabled = false;
                sendButton.disabled = false;
                messagesDiv.innerHTML = '';
                addMessage(`Hi ${userName}! 👋 I'm your DeepSeek AI assistant. How can I help you today?`, 'ai');
            }
        }

        function addMessage(content, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type === 'user' ? 'user-message' : 'ai-message'}`;
            messageDiv.innerHTML = `<div class="message-content">${escapeHtml(content)}</div>`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            messageInput.value = '';
            messageInput.disabled = true;
            sendButton.disabled = true;

            addMessage('🤔 Thinking...', 'ai');

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                // Remove the "Thinking..." message
                messagesDiv.removeChild(messagesDiv.lastChild);

                if (data.error) {
                    addMessage(`Error: ${data.error}`, 'ai');
                } else {
                    addMessage(data.reply, 'ai');
                }
            } catch (error) {
                messagesDiv.removeChild(messagesDiv.lastChild);
                addMessage('Sorry, something went wrong. Please try again.', 'ai');
            }

            messageInput.disabled = false;
            sendButton.disabled = false;
            messageInput.focus();
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendButton.disabled) {
                sendMessage();
            }
        });
    </script>
</body>
</html>
